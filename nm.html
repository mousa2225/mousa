<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة الاسترداد اليومي</title>
<style>
body { font-family: "Tahoma", sans-serif; background: linear-gradient(to bottom, #e8f5e9, #ffffff); margin:0; padding:20px; }
h1 { text-align:center; color:#2e7d32; margin-bottom:25px; }
.container { max-width:800px; margin:auto; background:white; padding:25px; border-radius:20px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
label { font-weight:bold; margin-top:10px; display:block; }
input, select { width:100%; padding:10px; margin:5px 0 15px; border-radius:8px; font-size:16px; text-align:center; }
button { padding:12px 20px; border:none; border-radius:10px; cursor:pointer; font-size:16px; margin:5px; }
button.save { background:#4CAF50; color:white; }
button.save:hover { background:#43a047; }
button.exceptional { background:#FF9800; color:white; }
button.exceptional:hover { background:#FB8C00; }
button.export { background:#03A9F4; color:white; }
button.export:hover { background:#0288D1; }
.table-container { margin-top:25px; overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:16px; }
th, td { border:1px solid #ddd; padding:12px; text-align:center; }
th { background:#4CAF50; color:white; }
tr:nth-child(even) { background:#f1f8e9; }
.modal { display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.5); }
.modal-content { background:#fff; margin:5% auto; padding:20px; border-radius:14px; max-width:480px; box-shadow:0 4px 15px rgba(0,0,0,0.2); position:relative; display:flex; flex-direction:column; }
.close { position:absolute; top:10px; right:15px; font-size:22px; font-weight:bold; cursor:pointer; color:#f44336; }
</style>
</head>
<body>

<h1>📘 حاسبة الاسترداد اليومي</h1>

<div class="container">
  <label>اسم العميل</label><input id="clientName" type="text">
  <label>رقم العميل</label><input id="clientNumber" type="text">
  <label>قيمة الباقة</label><input id="packageValue" type="number">
  <label>عدد أيام الباقة الأساسية</label><input id="packageDays" type="number">
  <label>عدد الأيام المستفاد بها</label><input id="daysUsed" type="number">
  <label>اسم البنك</label><input id="bankName" type="text">
  <label>رقم الحساب البنكي</label><input id="bankAccount" type="text">
  <label>نوع الاشتراك</label>
  <select id="subscriptionType">
    <option value="" disabled selected hidden>اختر نوع الاشتراك</option>
    <option value="تطبيق جديد">تطبيق جديد</option>
    <option value="تطبيق تجديد">تطبيق تجديد</option>
    <option value="جديد يدوي">جديد يدوي</option>
    <option value="تجديد يدوي">تجديد يدوي</option>
  </select>
  <label>الملاحظات</label><input id="notes" type="text">

  <button class="save" onclick="addAndCalculate()">💾 حفظ وحساب الاسترداد</button>
  <button class="exceptional" onclick="openExceptionalModal()">🌟 إضافة عميل استثنائي</button>
  <button class="export" onclick="exportToExcel()">📤 تصدير الإكسل</button>
</div>

<div id="exceptionalModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeExceptionalModal()">&times;</span>
    <h2>إضافة عميل استثنائي</h2>
    <label>اسم العميل</label><input id="exceptionalName">
    <label>رقم العميل</label><input id="exceptionalNumber">
    <label>قيمة الباقة (اختياري)</label><input type="number" id="exceptionalPackageValue">
    <label>عدد أيام الباقة (اختياري)</label><input type="number" id="exceptionalPackageDays">
    <label>عدد الأيام المستفاد بها (اختياري)</label><input type="number" id="exceptionalDaysUsed">
    <label>اسم البنك</label><input id="exceptionalBank">
    <label>رقم الحساب البنكي</label><input id="exceptionalAccount">
    <label>نوع الاشتراك</label>
    <select id="exceptionalType">
      <option value="" disabled selected hidden>اختر نوع الاشتراك</option>
      <option value="تطبيق جديد">تطبيق جديد</option>
      <option value="تطبيق تجديد">تطبيق تجديد</option>
      <option value="جديد يدوي">جديد يدوي</option>
      <option value="تجديد يدوي">تجديد يدوي</option>
    </select>
    <label>المبلغ المسترد يدويًا</label><input type="number" id="exceptionalRefund">
    <label>الملاحظات</label><input id="exceptionalNotes">
    <button onclick="saveExceptionalClient()">💾 حفظ العميل الاستثنائي</button>
  </div>
</div>

<div class="table-container">
  <table id="clientsTable">
    <thead>
      <tr>
        <th>اسم العميل</th><th>قيمة الباقة (عدد الأيام)</th><th>الأيام المستفاد بها</th><th>المبلغ المسترد</th>
        <th>اسم البنك</th><th>رقم الحساب</th><th>نوع الاشتراك</th><th>ملاحظات</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let clients = [];

function addAndCalculate() {
  const name = document.getElementById('clientName').value.trim();
  const number = document.getElementById('clientNumber').value.trim();
  const packageValue = parseFloat(document.getElementById('packageValue').value);
  const packageDays = parseFloat(document.getElementById('packageDays').value);
  const daysUsedInput = document.getElementById('daysUsed').value;
  const bank = document.getElementById('bankName').value.trim();
  const account = document.getElementById('bankAccount').value.trim();
  const type = document.getElementById('subscriptionType').value;
  const notes = document.getElementById('notes').value.trim();

  if (!name || !number) { alert("الرجاء إدخال اسم ورقم العميل"); return; }
  if (daysUsedInput === "") { alert("الرجاء إدخال عدد الأيام المستفاد بها"); return; }
  const daysUsed = parseFloat(daysUsedInput);
  if (daysUsed > packageDays) { alert("عدد الأيام المستفاد بها لا يمكن أن يتجاوز عدد الأيام الكلي للباقة"); return; }

  const refund = ((packageValue / packageDays) * (packageDays - daysUsed)).toFixed(2);

  clients.push({ name, number, packageValue, packageDays, daysUsed, bank, account, type, notes, refund, exceptional: false });
  renderTable();
  clearInputs();
}

function clearInputs() { document.querySelectorAll('.container input').forEach(i=>i.value=''); }

function openExceptionalModal() { document.getElementById('exceptionalModal').style.display='block'; }
function closeExceptionalModal() { document.getElementById('exceptionalModal').style.display='none'; }

function saveExceptionalClient() {
  const name = document.getElementById('exceptionalName').value.trim();
  const number = document.getElementById('exceptionalNumber').value.trim();
  const packageValue = parseFloat(document.getElementById('exceptionalPackageValue').value) || 0;
  const packageDays = parseFloat(document.getElementById('exceptionalPackageDays').value) || 0;
  const daysUsed = parseFloat(document.getElementById('exceptionalDaysUsed').value) || 0;
  const bank = document.getElementById('exceptionalBank').value.trim();
  const account = document.getElementById('exceptionalAccount').value.trim();
  const type = document.getElementById('exceptionalType').value;
  const refund = parseFloat(document.getElementById('exceptionalRefund').value);
  const notes = document.getElementById('exceptionalNotes').value.trim();

  if (!name || !number || isNaN(refund)) { alert("الرجاء إدخال الاسم والرقم والمبلغ المسترد"); return; }

  clients.push({ name, number, packageValue, packageDays, daysUsed, bank, account, type, notes, refund: refund.toFixed(2), exceptional:true });
  renderTable();
  closeExceptionalModal();
  document.querySelectorAll('#exceptionalModal input').forEach(i=>i.value='');
}

function renderTable() {
  const tbody = document.querySelector('#clientsTable tbody');
  tbody.innerHTML = '';
  let normalRowCount = 0;
  clients.forEach(c=>{
    let bg = c.exceptional ? "#ffe0b2" : (normalRowCount % 2 === 0 ? "#ffffff" : "#e3f2fd");
    if(!c.exceptional) normalRowCount++;
    tbody.innerHTML += `<tr style="background-color:${bg};">
      <td>${c.name}</td><td>${c.packageValue} (${c.packageDays})</td><td>${c.daysUsed}</td>
      <td>${c.refund}</td><td>${c.bank}</td><td>${c.account}</td>
      <td>${c.type}</td><td>${c.notes}</td>
    </tr>`;
  });
}

// تصدير Excel
function exportToExcel() {
  if(clients.length===0){ alert("لا يوجد عملاء للتصدير"); return; }

  const headers = ["اسم العميل","قيمة الباقة (عدد الأيام)","الأيام المستفاد بها","المبلغ المسترد","اسم البنك","رقم الحساب","نوع الاشتراك","ملاحظات"];
  const data = clients.map(c=>[c.name, c.packageValue+" ("+c.packageDays+")", c.daysUsed, c.refund, c.bank, c.account, c.type, c.notes]);
  const ws = XLSX.utils.aoa_to_sheet([headers,...data]);
  ws['!cols'] = [{wch:18},{wch:18},{wch:15},{wch:15},{wch:18},{wch:18},{wch:15},{wch:25}];

  const today=new Date(); today.setDate(today.getDate()-1);
  const day=today.getDate();
  const months=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const fileName=day+" "+months[today.getMonth()]+".xlsx";

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "العملاء");
  XLSX.writeFile(wb,fileName);
}
</script>
</body>
</html>
