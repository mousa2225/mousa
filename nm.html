<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة الاسترداد اليومي</title>
<style>
body {
  font-family: "Tahoma", Arial, sans-serif;
  background: linear-gradient(180deg, #e0f7fa 0%, #ffffff 100%);
  margin: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  box-sizing: border-box;
}
h1 { 
  color: #0288d1; 
  text-align: center; 
  margin-bottom: 25px; 
  font-size: 24px; 
}
.container {
  width: 100%;
  max-width: 480px;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  padding: 20px;
  box-sizing: border-box;
  margin-bottom: 20px;
}
label { 
  font-weight: bold; 
  color: #00796b; 
  font-size: 14px; 
  margin-top: 10px; 
}
input, select {
  width: 100%; 
  padding: 10px; 
  margin-top: 5px; 
  border: 2px solid #03a9f4;
  border-radius: 6px; 
  font-size: 14px; 
  text-align: center; 
  transition: 0.3s;
  box-sizing: border-box;
}
input:focus, select:focus { 
  border-color: #0288d1; 
  background-color: #e1f5fe; 
  outline: none; 
}
button {
  width: 100%; 
  background-color: #03a9f4; 
  color: white; 
  border: none;
  padding: 10px; 
  border-radius: 6px; 
  cursor: pointer; 
  font-size: 15px; 
  font-weight: bold;
  margin-top: 10px; 
  transition: 0.3s;
}
button:hover { background-color: #0288d1; }
button.delete { background-color: #f44336; font-size: 13px; padding: 6px 8px; }
.success-message { 
  color: green; 
  font-weight: bold; 
  text-align: center; 
  display: none; 
  margin-top: 10px; 
  font-size: 14px; 
}
.success-message::before { content: "✔ "; }
.table-wrapper { 
  width: 100%; 
  overflow-x: auto; 
  margin-top: 20px; 
}
table { 
  width: 100%; 
  min-width: 400px; 
  border-collapse: collapse; 
  text-align: center; 
  font-size: 13px; 
}
th, td { 
  border: 1px solid #03a9f4; 
  padding: 8px; 
  text-align: center; 
}
th { 
  background-color: #2196f3; 
  color: white; 
}
tr.exceptional td { background-color: #ffe0b2; } 
.modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); }
.modal-content { background-color: #fff; margin: 5% auto; padding: 20px; border-radius: 14px; max-width: 480px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; display: flex; flex-direction: column; }
.close { position: absolute; top: 10px; right: 15px; font-size: 22px; font-weight: bold; cursor: pointer; color:#f44336; }
.signature {
  margin-top: 30px;
  font-family: 'Brush Script MT', cursive, sans-serif; 
  font-size: 26px;
  color: #2c3e50;
  text-align: right; 
  font-style: italic;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<h1>حاسبة الاسترداد اليومي</h1>

<div class="container">
  <div class="success-message" id="successMsg">تم حفظ العميل وحساب الاسترداد بنجاح</div>

  <label>اسم العميل</label>
  <input type="text" id="clientName" placeholder="ادخل اسم العميل">
  <label>رقم العميل</label>
  <input type="text" id="clientNumber" placeholder="ادخل رقم العميل">
  <label>قيمة الباقة</label>
  <input type="number" id="packageValue" placeholder="ادخل قيمة الباقة">
  <label>عدد أيام الباقة الأساسية</label>
  <input type="number" id="packageDays" placeholder="ادخل عدد الأيام">
  <label>عدد الأيام المستفاد بها</label>
  <input type="number" id="daysUsed" placeholder="ادخل الأيام المستفاد بها">
  <label>اسم البنك</label>
  <input type="text" id="bankName" placeholder="ادخل اسم البنك">
  <label>رقم الحساب البنكي</label>
  <input type="text" id="bankAccount" placeholder="ادخل رقم الحساب">
  <label>نوع الاشتراك</label>
  <select id="subscriptionType">
    <option value="" disabled selected hidden>اختر نوع الاشتراك</option>
    <option value="تطبيق جديد">تطبيق جديد</option>
    <option value="تطبيق تجديد">تطبيق تجديد</option>
    <option value="جديد يدوي">جديد يدوي</option>
    <option value="تجديد يدوي">تجديد يدوي</option>
  </select>
  <label>الملاحظات</label>
  <input type="text" id="notes" placeholder="ادخل ملاحظات">

  <button onclick="addAndCalculate()">💾 حفظ وحساب الاسترداد</button>
  <button onclick="openExceptionalModal()">🌟 إضافة عميل استثنائي</button>

  <div class="signature">Accountant Mousa Muhammad</div>
</div>

<div id="exceptionalModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeExceptionalModal()">&times;</span>
    <h2>إضافة عميل استثنائي</h2>

    <label>اسم العميل</label>
    <input type="text" id="exceptionalName">
    <label>رقم العميل</label>
    <input type="text" id="exceptionalNumber">
    <label>اسم البنك</label>
    <input type="text" id="exceptionalBank">
    <label>رقم الحساب البنكي</label>
    <input type="text" id="exceptionalAccount">
    <label>نوع الاشتراك</label>
    <select id="exceptionalType">
      <option value="" disabled selected hidden>اختر نوع الاشتراك</option>
      <option value="تطبيق جديد">تطبيق جديد</option>
      <option value="تطبيق تجديد">تطبيق تجديد</option>
      <option value="جديد يدوي">جديد يدوي</option>
      <option value="تجديد يدوي">تجديد يدوي</option>
    </select>
    <label>المبلغ المسترد يدويًا</label>
    <input type="number" id="exceptionalRefund">
    <label>الملاحظات</label>
    <input type="text" id="exceptionalNotes">
    <button onclick="saveExceptionalClient()">💾 حفظ العميل الاستثنائي</button>
  </div>
</div>

<div class="table-wrapper">
  <table id="clientsTable">
    <tr>
      <th>اسم العميل</th>
      <th>قيمة الباقة (عدد الأيام)</th>
      <th>الأيام المستفاد بها</th>
      <th>المبلغ المسترد</th>
      <th>تعديل</th>
      <th>حذف</th>
    </tr>
  </table>
</div>

<button onclick="exportToExcel()">📥 إصدار ملف Excel</button>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let clients = [];

function addAndCalculate() {
  const name = clientName.value.trim();
  const number = clientNumber.value.trim();
  const packageValue = parseFloat(packageValueInput.value = packageValue.value);
  const packageDays = parseFloat(packageDaysInput.value = packageDays.value);
  const daysUsed = parseFloat(daysUsedInput.value = daysUsed.value);
  if (!name || !number || isNaN(daysUsed)) return alert("الرجاء إدخال جميع البيانات");
  if (daysUsed > packageDays) return alert("عدد الأيام المستفاد بها لا يمكن أن يتجاوز عدد الأيام الكلي للباقة");

  const refund = ((packageValue / packageDays) * (packageDays - daysUsed)).toFixed(2);
  clients.push({ name, number, daysUsed, refund, bank: bankName.value, account: bankAccount.value, type: subscriptionType.value, notes: notes.value, exceptional: false });
  successMsg.style.display = 'block';
  setTimeout(()=> successMsg.style.display='none', 2000);
  renderTable();
}

function openExceptionalModal() { exceptionalModal.style.display='block'; }
function closeExceptionalModal() { exceptionalModal.style.display='none'; }

function saveExceptionalClient() {
  const name = exceptionalName.value.trim();
  const number = exceptionalNumber.value.trim();
  const refund = parseFloat(exceptionalRefund.value);
  if (!name || !number || isNaN(refund)) return alert("الرجاء إدخال البيانات");
  clients.push({ name, number, daysUsed:"-", refund: refund.toFixed(2), bank: exceptionalBank.value, account: exceptionalAccount.value, type: exceptionalType.value, notes: exceptionalNotes.value, exceptional: true });
  closeExceptionalModal(); renderTable();
}

function renderTable() {
  const t = clientsTable;
  t.innerHTML = `<tr><th>اسم العميل</th><th>قيمة الباقة (عدد الأيام)</th><th>الأيام المستفاد بها</th><th>المبلغ المسترد</th><th>تعديل</th><th>حذف</th></tr>`;
  let n = 0;
  clients.forEach((c,i)=>{
    const bg = c.exceptional ? "#ffe0b2" : (n++%2 ? "#e3f2fd" : "#fff");
    t.innerHTML += `<tr style="background:${bg}"><td>${c.name}</td><td>${c.packageValue||'-'} (${c.packageDays||'-'})</td><td>${c.daysUsed}</td><td>${c.refund}</td>
    <td><button onclick="editClient(${i})">✏️</button></td><td><button class='delete' onclick="deleteClient(${i})">🗑️</button></td></tr>`;
  });
}

function editClient(i){
  const c=clients[i];
  const m=document.createElement('div');
  m.className='modal';m.id='editModal';
  m.innerHTML=`<div class="modal-content"><span class="close" onclick="editModal.remove()">&times;</span>
  <h2>تعديل العميل${c.exceptional?' الاستثنائي':''}</h2>
  <label>اسم العميل</label><input id="editName" value="${c.name}">
  <label>رقم العميل</label><input id="editNumber" value="${c.number}">
  <label>المبلغ المسترد${c.exceptional?' يدويًا':''}</label><input type="number" id="editRefund" ${!c.exceptional?'disabled':''} value="${c.refund}">
  <button onclick="saveEdit(${i})">💾 حفظ</button></div>`;
  document.body.appendChild(m);m.style.display='block';
}

function saveEdit(i){
  const c=clients[i];
  c.name=document.getElementById('editName').value;
  c.number=document.getElementById('editNumber').value;
  if(c.exceptional)c.refund=parseFloat(document.getElementById('editRefund').value).toFixed(2);
  document.getElementById('editModal').remove();renderTable();
}

function deleteClient(i){ if(confirm("هل أنت متأكد؟")){ clients.splice(i,1); renderTable(); } }

function exportToExcel() {
  if (clients.length === 0) return alert("لا يوجد عملاء للتصدير");
  const headers=["اسم العميل","رقم العميل","الأيام المستفاد بها","المبلغ المسترد","اسم البنك","رقم الحساب البنكي","نوع الاشتراك","ملاحظات"];
  const data=clients.map(c=>[c.name,c.number,c.daysUsed,c.refund,c.bank,c.account,c.type,c.notes]);
  const ws=XLSX.utils.aoa_to_sheet([headers,...data]);
  ws['!cols']=[{wch:18},{wch:16},{wch:15},{wch:16},{wch:18},{wch:20},{wch:16},{wch:25}];
  const range=XLSX.utils.decode_range(ws['!ref']);
  for(let R=range.s.r;R<=range.e.r;++R){
    for(let C=range.s.c;C<=range.e.c;++C){
      const ref=XLSX.utils.encode_cell({r:R,c:C});
      if(!ws[ref])continue;
      ws[ref].s={
        alignment:{horizontal:"center",vertical:"center"},
        font:{name:"Tahoma",sz:12,bold:R===0},
        fill:{patternType:"solid",fgColor:{rgb:R===0?"4CAFEB":(R%2===0?"FFFFFF":"D0ECE7")}},
        border:{top:{style:"thin",color:{rgb:"BBBBBB"}},bottom:{style:"thin",color:{rgb:"BBBBBB"}},left:{style:"thin",color:{rgb:"BBBBBB"}},right:{style:"thin",color:{rgb:"BBBBBB"}}}
      };
    }
  }
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"العملاء");
  const d=new Date();d.setDate(d.getDate()-1);
  const day=d.getDate();const months=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  XLSX.writeFile(wb,`${day} ${months[d.getMonth()]}.xlsx`);
}
</script>
</body>
</html>
